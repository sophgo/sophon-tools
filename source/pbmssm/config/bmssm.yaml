server:
  listenIP: ""
  port: 9779
  auth: true
  authSecret: "bmssm-dev-secret"
  defaultPassword: "admin"
  deviceName: "device_1"
log:
  level: info
  path: /var/log/bmssm
alarmThreshold:
  boardTemperature: 90
  coreTemperature: 90
  cpuRate: 0.95
  diskRate: 0.95
  totalMemoryScale: 0.95
  tpuRate: 0.95
  tpuScale: 0.95
db:
  driver: sqlite3
  path: /var/lib/bmssm/bmssm.db
ota:
  dryRun: false
metrics:
  enabled: true                    # 总开关；false 则不采集 Prometheus 指标、不写存档
  updateIntervalSeconds: 20        # 采样间隔（秒）。越小越精细但占空间越多；
                                   # 20s + v3 schema(18字段) 下 100MB 约存 2 年
  temperatureThresholds:
    critical: 90
    warning: 85
  archive:                         # 性能历史存档（定长二进制 record + gzip 分段）
    enabled: true                  # 存档开关
    path: /var/lib/bmssm/metrics   # 存档目录
    maxSizeMB: 100                # 所占空间淘汰上限（MB）；累计超限按 FIFO 删除最旧分段。无时间淘汰。
    channelBufferSize: 16          # 异步写入通道大小；满则丢弃最旧样本（不影响 Prometheus 实时更新）
